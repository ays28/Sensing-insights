name: Run tracker

on:
  schedule:
    - cron: "0 */22 * * *"  # every 12 hours
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: tracker
  cancel-in-progress: true

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests
          pip install git+https://github.com/ShinMegamiBoson/OpenPlanter.git

      - name: Run tracker.py (OpenPlanter -> JSON outputs)
        env:
          EXA_API_KEY: ${{ secrets.EXA_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: gpt-5.2
          FETCH_TIMEOUT: "25"
          NOMINATIM_USER_AGENT: "SensingInsightsTracker/1.0 (GitHub Actions)"
          NOMINATIM_MIN_DELAY_SEC: "1.2"
        run: |
          set -e
          python tracker.py

      - name: Debug outputs
        run: |
          set -e
          echo "=== Root files ==="
          ls -la
          echo "=== Output sizes ==="
          for f in op_extract.json latest.json events.geojson graph.json history.jsonl geocode_cache.json; do
            if [ -f "$f" ]; then
              echo "OK: $f (bytes=$(wc -c < "$f"))"
            else
              echo "MISSING: $f"
            fi
          done
          echo "=== Git status ==="
          git status --porcelain=v1 || true

      - name: Commit updates
        run: |
          set -e
          git config user.name "tracker-bot"
          git config user.email "tracker-bot@users.noreply.github.com"

          git add \
            op_extract.json \
            latest.json \
            events.geojson \
            graph.json \
            history.jsonl \
            geocode_cache.json \
            || true

          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Update tracker outputs"
          git push
