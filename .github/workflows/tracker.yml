name: Run tracker

on:
  schedule:
    - cron: "0,22,44 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: tracker
  cancel-in-progress: true

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run tracker.py
        env:
          EXA_API_KEY: ${{ secrets.EXA_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: gpt-4o-mini
          # Optional knobs if your tracker.py uses them
          EXA_PER_QUERY: "10"
          MAX_FETCH_URLS: "30"
        run: |
          python tracker.py

      - name: Commit updates
        run: |
          git config user.name "tracker-bot"
          git config user.email "tracker-bot@users.noreply.github.com"

          git add latest.json events.geojson history.jsonl graph.json geocode_cache.json events.jsonl links.jsonl news.jsonl timeline.json || true

          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Update tracker data"

          # Avoid 'fetch first' rejection if another run pushed
          git pull --rebase origin main

          git push origin main
