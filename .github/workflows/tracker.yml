name: Run tracker

on:
  schedule:
    # every ~22 minutes (matches your current schedule style)
    - cron: "0,22,44 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: tracker
  cancel-in-progress: true

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Show branch/commit (debug)
        run: |
          echo "BRANCH: $GITHUB_REF_NAME"
          echo "COMMIT: $(git rev-parse HEAD)"
          echo "WORKFLOWS:"
          ls -la .github/workflows || true
          echo "TRACKER HEAD:"
          sed -n '1,120p' tracker.py || true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install requests
          # Install OpenPlanter so `openplanter-agent` exists (tracker.py calls it)
          pip install git+https://github.com/ShinMegamiBoson/OpenPlanter.git

      - name: Run tracker.py
        env:
          EXA_API_KEY: ${{ secrets.EXA_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: gpt-4o-mini
          EXA_PER_QUERY: "10"
          MAX_FETCH_URLS: "30"
          FETCH_TIMEOUT: "25"
          MAX_PAGE_CHARS: "18000"
          # Helps Nominatim not block you (if OpenPlanter uses it indirectly / future-proofing)
          NOMINATIM_USER_AGENT: "SensingInsightsTracker/1.0 (GitHub Actions; contact via repo owner)"
          NOMINATIM_MIN_DELAY_SEC: "1.2"
        run: |
          set -e
          python tracker.py

      - name: Commit updates
        run: |
          set -e
          git config user.name "tracker-bot"
          git config user.email "tracker-bot@users.noreply.github.com"

          # Rebase first to avoid push failures if main moved
          git pull --rebase origin main

          # Add the artifacts your repo already tracks
          git add \
            latest.json \
            events.geojson \
            history.jsonl \
            graph.json \
            geocode_cache.json \
            events.jsonl \
            links.jsonl \
            news.jsonl \
            timeline.json \
            || true

          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Update tracker data"
          git push origin main
