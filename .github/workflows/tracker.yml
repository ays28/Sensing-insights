name: Run tracker

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run tracker.py
        env:
          EXA_API_KEY: ${{ secrets.EXA_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: gpt-4o-mini
          TRACK_QUERY: Iran Middle East escalation Red Sea shipping Strait of Hormuz sanctions strikes drones missiles diplomacy
        run: |
          python tracker.py

      - name: Commit updates
        run: |
          git config user.name "tracker-bot"
          git config user.email "tracker-bot@users.noreply.github.com"
          git add latest.json events.geojson history.jsonl events.jsonl links.jsonl graph.json geocode_cache.json || true
          git diff --staged --quiet || git commit -m "Update tracker data"
          git push
